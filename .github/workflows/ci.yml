name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Syntax Check & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instala dependencias de teste
        run: pip install python-dotenv --quiet

      - name: Syntax check em todos os arquivos .py
        run: python scripts/ci_syntax_check.py

      - name: Teste knowledge_base
        run: python scripts/ci_test_knowledge_base.py

      - name: Teste tools
        run: python scripts/ci_test_tools.py

      - name: Teste prompts
        run: python scripts/ci_test_prompts.py

      - name: Teste context
        run: python scripts/ci_test_context.py
